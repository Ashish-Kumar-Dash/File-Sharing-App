name: OpenLake CI

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Go format check
        working-directory: Go
        run: |
          go fmt ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Go files need formatting"
            exit 1
          fi

      - name: Go tests
        working-directory: Go
        run: go test -v -coverprofile=coverage.out ./...

      - name: Go build
        working-directory: Go
        run: go build -v ./...

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Flutter dependencies
        working-directory: filesharing
        run: flutter pub get

      - name: Flutter analyze
        working-directory: filesharing
        run: flutter analyze

      - name: Flutter tests
        working-directory: filesharing
        run: flutter test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Docker Compose
        run: docker compose build

  pr-comment:
    name: PR Status
    runs-on: ubuntu-latest
    needs: [security, build-test, docker]
    if: always() && github.event_name == 'pull_request'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const needs = ${{ toJSON(needs) }};
            let status = '✅';
            let summary = 'All checks passed!';
            for (const [job, result] of Object.entries(needs)) {
              if (result.result === 'failure') {
                status = '❌';
                summary = `Job '${job}' failed.`;
                break;
              }
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${status} **CI Status**: ${summary}\n\n[View Logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });
